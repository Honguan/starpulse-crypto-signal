<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StarPulse Crypto Signal</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <p class="eyebrow">StarPulse Crypto Signal</p>
      <h1>星脈加密貨幣訊號看板</h1>
      <p class="subtitle">用簡單訊號看懂多空方向，背後結合 Vegas 隧道、神奇九轉、趨勢、動能、量能、支撐壓力與風險分析。</p>
    </div>
  </header>

  <main class="wrap">
    <section id="status" class="status-grid" aria-label="狀態列"></section>
    <p id="error" class="error" hidden></p>

    <section class="panel" aria-labelledby="market-title">
      <div class="section-heading">
        <h2 id="market-title">市場總覽</h2>
      </div>
      <div id="market" class="market"></div>
    </section>

    <section class="panel" aria-labelledby="long-title">
      <div class="section-heading">
        <h2 id="long-title">做多推薦 Top 5</h2>
      </div>
      <div id="long-list" class="card-grid"></div>
    </section>

    <section class="panel" aria-labelledby="short-title">
      <div class="section-heading">
        <h2 id="short-title">做空推薦 Top 5</h2>
      </div>
      <div id="short-list" class="card-grid"></div>
    </section>

    <section class="panel" aria-labelledby="watch-title">
      <div class="section-heading">
        <h2 id="watch-title">觀望清單</h2>
      </div>
      <div id="watch-list" class="card-grid"></div>
    </section>

    <section class="panel" aria-labelledby="risk-title">
      <div class="section-heading">
        <h2 id="risk-title">高風險不交易區</h2>
      </div>
      <div id="risk-list" class="card-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <strong>風險提示：</strong>
      本工具僅提供市場資料整理與技術分析輔助，不構成投資建議。加密貨幣波動極高，任何訊號都可能失效。請自行控制倉位、停損與風險。
    </div>
  </footer>

  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
