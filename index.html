<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StarPulse Crypto Signal</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <p class="eyebrow">StarPulse Crypto Signal</p>
      <h1>星脈加密貨幣訊號看板</h1>
      <p class="subtitle">每個幣種同時呈現做多與做空計畫；條件不足時只顯示觀望，不提供可執行訊號。</p>
    </div>
  </header>

  <main class="wrap">
    <section id="status" class="status-grid" aria-label="狀態列"></section>
    <p id="error" class="error" hidden></p>

    <section class="filter-panel" aria-label="手動指定幣種">
      <label for="coin-symbol">指定幣種</label>
      <div class="filter-row">
        <input id="coin-symbol" type="search" placeholder="例如 BTCUSDT" autocomplete="off">
        <button id="add-favorite" type="button">加入最愛</button>
        <button id="clear-symbol" type="button">清除</button>
      </div>
      <div class="mode-row" role="group" aria-label="顯示模式">
        <button class="mode-button active" type="button" data-mode="all">全部</button>
        <button class="mode-button" type="button" data-mode="favorites">最愛</button>
      </div>
    </section>

    <section class="panel" aria-labelledby="market-title">
      <div class="section-heading">
        <h2 id="market-title">市場總覽</h2>
      </div>
      <div id="market" class="market"></div>
    </section>

    <section class="panel" aria-labelledby="plans-title">
      <div class="section-heading">
        <h2 id="plans-title">雙向交易計畫</h2>
      </div>
      <div id="plan-list" class="card-grid"></div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <strong>風險提示：</strong>
      本工具僅提供市場資料整理與技術分析輔助，不構成投資建議。加密貨幣波動極高，任何訊號都可能失效。請自行控制倉位、停損與風險。
    </div>
  </footer>

  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
